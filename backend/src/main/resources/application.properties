spring.application.name=UPI-Offline
# Server
server.port=8080

# ---- Database: PostgreSQL (local) ----
spring.datasource.url=jdbc:postgresql://localhost:5432/offlinePayment
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---- OAuth2 — Google ----
# Rotate the client secret in Google Cloud Console, then set these as real
# environment variables instead of hardcoding them here.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
#spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:CHANGE_ME}
#spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:CHANGE_ME}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ---- OAuth2 — GitHub ----
# Register at https://github.com/settings/developers → OAuth Apps
# Authorization callback URL: http://localhost:8080/login/oauth2/code/github
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
#spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:CHANGE_ME}
#spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:CHANGE_ME}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# ---- Frontend / CORS / session ----
# The React app's origin — needed for Securityconfig's CORS bean and for
# OAuth2LoginSuccessHandler's post-login redirect.
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
server.servlet.session.cookie.same-site=Lax

# H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.com.demo.upimesh=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Idempotency window (how long a packet hash is remembered)
upi.mesh.idempotency-ttl-seconds=86400

# Packet freshness window — anything older than this is rejected as replay
upi.mesh.packet-max-age-seconds=86400